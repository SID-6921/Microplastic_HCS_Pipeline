name: Bug report
description: Something in the pipeline produces wrong output or crashes
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Please fill in as much detail as possible so we can reproduce the issue quickly.

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "e.g. 3.12.3"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Ubuntu 22.04 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened and what did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal commands to trigger the bug
      placeholder: |
        1. python scripts/build_all_results.py
        2. ...
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Error output / traceback
      render: shell
