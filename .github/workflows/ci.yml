name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    env:
      PYTHONPATH: ${{ github.workspace }}
      TARGET_PER_CLASS: '10'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Syntax check
        run: python -m compileall pipeline scripts tests

      - name: Run tests
        run: python -m pytest -q --tb=short tests

      - name: Smoke build (fast mode)
        run: python scripts/build_all_results.py
        env:
          TARGET_PER_CLASS: '5'
